<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#2A2318"/>
      <stop offset="55%" stop-color="#1A1510"/>
      <stop offset="100%" stop-color="#0D0B07"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E098"/>
      <stop offset="28%" stop-color="#E8C96A"/>
      <stop offset="65%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7830"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7830"/>
      <stop offset="45%" stop-color="#F5E098"/>
      <stop offset="100%" stop-color="#9A7830"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="20%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <rect x="3" y="5" width="58" height="58" rx="16" fill="rgba(0,0,0,0.6)" filter="url(#glow)"/>
  <!-- Dark bottom bevel -->
  <rect x="1" y="1" width="62" height="62" rx="17" fill="rgba(0,0,0,0.65)"/>
  <!-- Main dark plate -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Coin ring 1 -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="14" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="1.2"/>
  <!-- Coin ring 2 -->
  <rect x="4.5" y="4.5" width="55" height="55" rx="12" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="0.6"/>
  <!-- Top bevel highlight -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <!-- Shine overlay -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#shine)"/>

  <!-- Monogram A -->
  <path d="M8 46 L17 19 L26 46" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M12 35 L22 35" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <!-- Monogram S -->
  <path d="M33 25 C33 22.2 35.2 20 38 20 C40.8 20 43 21.8 43 24.2 C43 26.5 40.5 27.7 38.5 28.6 C36.5 29.5 34 31 34 33.8 C34 36.6 36.3 38.5 39 38.5 C41.7 38.5 43.5 36.8 43.5 34.8"
    stroke="url(#gold)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Bottom accent line -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="url(#goldH)" stroke-width="0.9" opacity="0.38"/>

  <!-- Corner gem -->
  <circle cx="52" cy="12" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="52" cy="12" r="1.5" fill="#F5E098" opacity="0.95"/>
</svg>
